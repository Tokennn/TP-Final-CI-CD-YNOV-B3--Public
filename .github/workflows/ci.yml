name: CI

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Annule les runs précédents encore en cours sur la même réf.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: api

jobs:
  # --------------------------------------------------------------------------
  lint:
    name: Lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  # --------------------------------------------------------------------------
  test:
    name: Tests (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["18.x", "20.x"]

    # PostgreSQL réel pour les tests d'intégration.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: shoplite_test
          POSTGRES_USER: shoplite
          POSTGRES_PASSWORD: shoplite_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shoplite -d shoplite_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://shoplite:shoplite_ci_password@localhost:5432/shoplite_test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - name: Tests unitaires + intégration + couverture (>= 80%)
        run: npm run test:coverage
      - name: Publier le rapport de couverture
        if: matrix.node == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage
          retention-days: 7

  # --------------------------------------------------------------------------
  audit:
    name: Audit dépendances
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - name: npm audit (production)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true
      - name: npm outdated (informatif)
        run: npm outdated || true

  # --------------------------------------------------------------------------
  docker:
    name: Build image + scan Trivy
    runs-on: ubuntu-latest
    needs: [lint, test] # le build ne part que si lint ET tests sont verts
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Build image API
        working-directory: .
        run: docker build --build-arg APP_VERSION=ci-${{ github.sha }} -t shoplite-api:ci ./api

      - name: Build image frontend
        working-directory: .
        run: docker build -t shoplite-frontend:ci ./frontend

      - name: Scan Trivy de l'image API
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: shoplite-api:ci
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0" # rapport sans bloquer (pédagogique)
