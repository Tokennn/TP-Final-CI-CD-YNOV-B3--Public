name: CD

on:
  push:
    branches: [develop] # -> déploiement staging
    tags: ["v*"] # -> déploiement production (simulée)
  workflow_dispatch:
    inputs:
      target:
        description: Environnement à déployer
        type: choice
        options: [staging, production]
        default: staging

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  # --------------------------------------------------------------------------
  # 1) Build + publication des images taguées dans GHCR (traçabilité registry).
  # --------------------------------------------------------------------------
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Déterminer la version (tag Git -> tag Docker)
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"          # ex: v1.0.0
          else
            VERSION="staging-${GITHUB_SHA::7}"     # ex: staging-a1b2c3d
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version déployée: ${VERSION}"

      - name: Nom de repo en minuscules (contrainte GHCR)
        id: repo
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API
        run: |
          IMG=ghcr.io/${{ steps.repo.outputs.owner }}/shoplite-api
          docker build --build-arg APP_VERSION=${{ steps.meta.outputs.version }} \
            -t $IMG:${{ steps.meta.outputs.version }} -t $IMG:latest ./api
          docker push $IMG:${{ steps.meta.outputs.version }}
          docker push $IMG:latest

      - name: Build & push frontend
        run: |
          IMG=ghcr.io/${{ steps.repo.outputs.owner }}/shoplite-frontend
          docker build -t $IMG:${{ steps.meta.outputs.version }} -t $IMG:latest ./frontend
          docker push $IMG:${{ steps.meta.outputs.version }}
          docker push $IMG:latest

  # --------------------------------------------------------------------------
  # 2) Déploiement STAGING (push develop) + smoke test.
  # --------------------------------------------------------------------------
  deploy-staging:
    name: Deploy staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && inputs.target == 'staging')
    environment:
      name: staging
      url: http://localhost:8081
    steps:
      - uses: actions/checkout@v4
      - name: Préparer .env staging (valeurs éphémères CI)
        run: |
          cat > .env <<EOF
          APP_VERSION=${{ needs.build-and-push.outputs.version }}
          HTTP_PORT=8081
          POSTGRES_DB=shoplite_staging
          POSTGRES_USER=shoplite_staging
          POSTGRES_PASSWORD=ci_ephemeral_pw
          DATABASE_URL=postgres://shoplite_staging:ci_ephemeral_pw@db:5432/shoplite_staging
          LOG_LEVEL=debug
          EOF
      - name: Démarrer la stack staging
        run: |
          docker compose -p shoplite-staging \
            -f docker-compose.yml -f docker-compose.staging.yml \
            up -d --build
      - name: Smoke test post-déploiement
        run: BASE_URL=http://localhost:8081 ./scripts/smoke-test.sh
      - name: Logs en cas d'échec
        if: failure()
        run: docker compose -p shoplite-staging logs --tail=100
      - name: Teardown (sans supprimer les volumes)
        if: always()
        run: docker compose -p shoplite-staging -f docker-compose.yml -f docker-compose.staging.yml down

  # --------------------------------------------------------------------------
  # 3) Déploiement PRODUCTION (tag v*) - approbation manuelle via environment.
  # --------------------------------------------------------------------------
  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.target == 'production')
    environment:
      name: production # protégé : required reviewers (validation manuelle)
      url: http://localhost:8082
    steps:
      - uses: actions/checkout@v4
      - name: Préparer .env prod (valeurs éphémères CI)
        run: |
          cat > .env <<EOF
          APP_VERSION=${{ needs.build-and-push.outputs.version }}
          HTTP_PORT=8082
          POSTGRES_DB=shoplite_prod
          POSTGRES_USER=shoplite_prod
          POSTGRES_PASSWORD=ci_ephemeral_pw
          DATABASE_URL=postgres://shoplite_prod:ci_ephemeral_pw@db:5432/shoplite_prod
          LOG_LEVEL=info
          EOF
      - name: Démarrer la stack production (build local pour la démo CI)
        run: |
          docker compose -p shoplite-prod \
            -f docker-compose.yml \
            up -d --build
      - name: Smoke test post-déploiement
        run: BASE_URL=http://localhost:8082 ./scripts/smoke-test.sh
      - name: Logs en cas d'échec
        if: failure()
        run: docker compose -p shoplite-prod logs --tail=100
      - name: Teardown (sans supprimer les volumes)
        if: always()
        run: docker compose -p shoplite-prod down
